
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>城市自我介紹 — 台北</title>
  <style>
    :root{--bg:#f7f7fb;--card:#ffffff;--accent:#ff6b6b;--muted:#6b6b6b}
    body{font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', 'Helvetica Neue', Arial; background:var(--bg); color:#222; margin:0; padding:40px; display:flex; align-items:center; justify-content:center; min-height:100vh}
    .card{background:var(--card); max-width:800px; width:100%; border-radius:12px; box-shadow:0 8px 30px rgba(27,31,35,0.08); padding:32px}
    h1{margin:0 0 8px; font-size:28px; color:var(--accent)}
    p.lead{margin:0 0 18px; color:var(--muted)}
    .grid{display:grid; grid-template-columns:1fr 320px; gap:20px}
    .meta{font-size:14px; color:var(--muted)}
    .badge{display:inline-block; background:#eef6ff; color:#0b63d6; padding:6px 10px; border-radius:999px; font-weight:600}
    .photo{height:200px; border-radius:8px; background:linear-gradient(135deg,#ffd6d6,#ffe6b3); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700}
    footer{margin-top:20px; font-size:13px; color:var(--muted)}
    @media (max-width:760px){.grid{grid-template-columns:1fr;}.photo{height:160px}}
  </style>
</head>
<body>
  <main class="card">
    <div class="grid">
      <section>
        <h1>嗨，我是台北</h1>
        <p class="lead">一座融合傳統與現代的小城，歡迎你來探索我的每一個角落。</p>

        <p>白天，我在公園與博物館裡輕聲講述歷史；夜晚，街角的夜市與小吃攤把熱鬧與溫度留給你。捷運網絡讓你在短時間內遇見不同風景與人情；老巷弄裡的手作店與咖啡香則藏著日常的小確幸。</p>

        <p class="meta"><span class="badge">生活節奏：</span> 熱鬧但不失細膩 • <span class="badge">適合：</span> 美食、文化、夜生活、漫步</p>

        <footer>想更了解我？帶著好奇心來一趟漫遊吧。</footer>
      </section>

      <aside>
        <div class="photo">台北 • 城市剪影</div>
        <p style="margin-top:12px;">快速指引：在電腦上開啟此檔案以檢視完整頁面；或啟動簡單伺服器分享給朋友。</p>
      </aside>
    </div>
  </main>
</body>
</html>
